{% load static %}
<footer class="site-footer" aria-label="Site footer">
  <div class="site-footer-inner">
    <a class="site-footer-brand" href="/">
      <picture>
        <source srcset="{% static 'assets/optimized/images/ui/prostagma_arkantos.brand.webp' %}" type="image/webp">
        <img src="{% static 'assets/images/ui/prostagma_arkantos.png' %}" alt="" width="44" height="44" loading="lazy">
      </picture>
      <span>
        <strong>Prostagma?</strong>
        <small>For the players. By the community.</small>
      </span>
    </a>

    <div class="site-footer-meta">
      <nav class="site-footer-links" aria-label="Footer navigation">
        <a href="/lobbies/">Lobbies</a>
        <a href="/build_orders/">Build Orders</a>
        <a href="/agora/">Agora</a>
        <a href="/about/">About</a>
        <a href="/faq/">FAQ</a>
      </nav>
      <p class="site-footer-note">
        Unofficial Age of Mythology: Retold tools built for the community.
      </p>
    </div>
  </div>

  <picture class="site-footer-shake-option site-footer-shake-floor" data-site-footer-shake-option>
    <source srcset="{% static 'assets/optimized/images/easter_eggs/master_shake_floor.webp' %}" type="image/webp">
    <img class="site-shake-deco" src="{% static 'assets/images/easter_eggs/master_shake_floor.png' %}" alt="" loading="lazy" aria-hidden="true">
  </picture>
  <picture class="site-footer-shake-option site-footer-shake-left" data-site-footer-shake-option>
    <source srcset="{% static 'assets/optimized/images/easter_eggs/master_shake_left.webp' %}" type="image/webp">
    <img class="site-shake-deco" src="{% static 'assets/images/easter_eggs/master_shake_left.png' %}" alt="" loading="lazy" aria-hidden="true">
  </picture>
  <picture class="site-footer-shake-option site-footer-shake-looking" data-site-footer-shake-option>
    <source srcset="{% static 'assets/optimized/images/easter_eggs/master_shake_looking.webp' %}" type="image/webp">
    <img class="site-shake-deco" src="{% static 'assets/images/easter_eggs/master_shake_looking.png' %}" alt="" loading="lazy" aria-hidden="true">
  </picture>
  <picture class="site-footer-shake-option site-footer-shake-classic" data-site-footer-shake-option>
    <source srcset="{% static 'assets/optimized/images/easter_eggs/master_shake.webp' %}" type="image/webp">
    <img class="site-shake-deco" src="{% static 'assets/images/easter_eggs/master_shake.png' %}" alt="" loading="lazy" aria-hidden="true">
  </picture>
  <picture class="site-footer-shake-option site-footer-shake-shocked" data-site-footer-shake-option>
    <source srcset="{% static 'assets/optimized/images/easter_eggs/master_shake_shocked.webp' %}" type="image/webp">
    <img class="site-shake-deco" src="{% static 'assets/images/easter_eggs/master_shake_shocked.png' %}" alt="" loading="lazy" aria-hidden="true">
  </picture>
</footer>
